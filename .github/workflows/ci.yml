name: CI

on:
  push:
    branches: [main, stable]
  pull_request:
    branches: [main, stable]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Linux native build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdrm-dev libgbm-dev libegl1-mesa-dev libgl1-mesa-dev
      - name: Configure MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build Processing package
        run: python3 scripts/build_package.py
      - name: Check package shape
        run: python3 scripts/check_package.py
      - name: Native load and CPU oracle smoke
        shell: bash
        run: |
          platform_dir=$(python3 scripts/platform_folder.py)
          java -Djava.library.path="$platform_dir" -cp build/classes processing.nozzle.NozzleSelfTest
      - name: Install Linux virtual display
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      - name: Processing sketch runtime smoke
        if: runner.os == 'Linux'
        run: xvfb-run -a python3 scripts/run_processing_sketch_smoke.py
